# THIS IS AUTOGENERATED. DO NOT EDIT MANUALLY
version = 1
name = "vs-native-mycpu"

[setup]
script = '''
# myCPU_compatible local environment
# Use Windows override below.
'''

[setup.win32]
script = '''
Set-StrictMode -Version Latest
$ErrorActionPreference = "Stop"

if (-not $env:CODEX_WORKTREE_PATH) {
    throw "CODEX_WORKTREE_PATH is not set."
}

Set-Location $env:CODEX_WORKTREE_PATH
Write-Host "[setup] worktree path: $PWD"

$checkScript = Join-Path $env:CODEX_WORKTREE_PATH "tools\check_env.ps1"
$vsdevScript = Join-Path $env:CODEX_WORKTREE_PATH "tools\enter_vsdev.ps1"

if (-not (Test-Path $checkScript)) {
    throw "Missing script: $checkScript"
}

if (-not (Test-Path $vsdevScript)) {
    throw "Missing script: $vsdevScript"
}

if (-not (Test-Path ".\build")) {
    New-Item -ItemType Directory -Path ".\build" | Out-Null
    Write-Host "[setup] created build directory"
} else {
    Write-Host "[setup] build directory already exists"
}

Write-Host "[setup] local environment initialized"
'''

[cleanup]
script = "Write-Host \"[cleanup] no cleanup needed\""

[[actions]]
name = "check-env"
icon = "tool"
command = '''
Set-Location $env:CODEX_WORKTREE_PATH
& .\tools\check_env.ps1
'''

[[actions]]
name = "enter-vsdev"
icon = "tool"
command = '''
Set-Location $env:CODEX_WORKTREE_PATH
& .\tools\enter_vsdev.ps1
'''

[[actions]]
name = "build-release"
icon = "tool"
command = '''
Set-Location $env:CODEX_WORKTREE_PATH
& .\tools\enter_vsdev.ps1 'cmake --build .\build --config Release'
'''

[[actions]]
name = "ctest-release"
icon = "tool"
command = '''
Set-Location $env:CODEX_WORKTREE_PATH
& .\tools\enter_vsdev.ps1 'ctest -C Release --output-on-failure --test-dir .\build'
'''

[[actions]]
name = "trace-smoke"
icon = "tool"
command = '''
Set-Location $env:CODEX_WORKTREE_PATH
.\build\Release\mycpu.exe --use-program smoke --max-steps 13 --trace .\build\smoke.jsonl
'''

[[actions]]
name = "trace-uart"
icon = "tool"
command = '''
Set-Location $env:CODEX_WORKTREE_PATH
.\build\Release\mycpu.exe --use-program uart --max-steps 8 --trace .\build\uart.jsonl
'''
